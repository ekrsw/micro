version: '3.8'

services:
  postgres-test:
    image: postgres:15
    container_name: auth-service-postgres-test
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_auth_db
    ports:
      - "5433:5432"  # 通常のPostgreSQLと競合しないようにポートを変更
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test_auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7
    container_name: auth-service-redis-test
    ports:
      - "6380:6379"  # 通常のRedisと競合しないようにポートを変更
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: auth-service-test
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://test:test@postgres-test:5432/test_auth_db
      - REDIS_URL=redis://redis-test:6379/1
      - SECRET_KEY=test_secret_key
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_HOURS=24
      - ACCESS_TOKEN_REDIS_EXPIRE_SECONDS=900
      - API_V1_STR=/api/v1
      - TESTING=True
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    command: pytest -v
