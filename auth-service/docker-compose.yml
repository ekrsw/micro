version: '3.8'

services:
  auth-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=auth
      - POSTGRES_HOST=auth-db
      - POSTGRES_PORT=5432
    depends_on:
      - auth-db
    networks:
      - microservice-network

  auth-db:
    image: postgres:13
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=auth
    ports:
      - "5432:5432"
    networks:
      - microservice-network

volumes:
  auth-postgres-data:

networks:
  microservice-network:
    external: true