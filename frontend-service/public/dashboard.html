<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダッシュボード - マイクロサービス</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container dashboard-container">
        <header class="dashboard-header">
            <h1>マイクロサービスダッシュボード</h1>
            <div class="user-info">
                <span>ようこそ、<span id="user-username">ユーザー</span>さん</span>
                <button id="logout-btn" class="btn-logout">ログアウト</button>
            </div>
        </header>
        
        <main class="dashboard-content">
            <div class="dashboard-card">
                <h2>ユーザー情報</h2>
                <div class="user-details">
                    <p><strong>ユーザー名:</strong> <span id="user-username-detail"></span></p>
                    <p><strong>ユーザーID:</strong> <span id="user-id"></span></p>
                    <p><strong>アカウント状態:</strong> <span id="user-status"></span></p>
                    <p><strong>管理者権限:</strong> <span id="user-admin"></span></p>
                </div>
            </div>
            
            <div class="dashboard-card">
                <h2>システム情報</h2>
                <div class="system-info">
                    <p><strong>APIステータス:</strong> <span id="api-status">確認中...</span></p>
                    <p><strong>データベース接続:</strong> <span id="db-status">確認中...</span></p>
                    <button id="check-health-btn" class="btn-check">ヘルスチェック</button>
                </div>
            </div>
        </main>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
